<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--jet-black); color: var(--alabaster); margin: 0; padding: 40px 32px 28px; }
  .grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr 1fr;
    gap: 32px;
  }
  .col-head {
    font-family: var(--font-sans);
    font-size: 10px;
    font-weight: var(--weight-medium);
    letter-spacing: var(--tracking-cta);
    text-transform: uppercase;
    color: var(--concrete);
    margin-bottom: 16px;
  }
  .tag {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: var(--weight-light);
    font-size: 15px;
    color: var(--concrete);
    margin-top: 18px;
    line-height: 1.4;
  }
  a {
    display: block;
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: var(--weight-light);
    color: var(--alabaster);
    text-decoration: none;
    padding: 4px 0;
    border-bottom: none;
  }
  input {
    width: 100%;
    height: 38px;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--alabaster);
    color: var(--alabaster);
    font-family: var(--font-sans);
    font-size: 13px;
    outline: none;
  }
  input::placeholder { color: var(--concrete); }
  .btn {
    margin-top: 12px;
    background: var(--alabaster);
    color: var(--jet-black);
    border: none;
    height: 32px;
    padding: 0 16px;
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: var(--weight-medium);
    letter-spacing: var(--tracking-cta);
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
  }
  .bottom {
    margin-top: 28px;
    padding-top: 18px;
    border-top: 1px solid #ffffff14;
    display: flex;
    justify-content: space-between;
    font-family: var(--font-sans);
    font-size: 10px;
    font-weight: var(--weight-medium);
    letter-spacing: var(--tracking-cta);
    text-transform: uppercase;
    color: var(--concrete);
  }
</style>
</head>
<body>
<div class="grid">
  <div>
    <img src="../assets/logotype_white.svg" alt="HINCHELYS" style="height: 22px; display: block;">
    <div class="tag">Iværksættere fra Sønderjylland.</div>
  </div>
  <div>
    <div class="col-head">Sektioner</div>
    <a>Om os</a><a>Virksomheder</a><a>Foredrag</a><a>Medie</a>
  </div>
  <div>
    <div class="col-head">Kontakt</div>
    <a>kontakt@hinchelys.dk</a><a>LinkedIn</a>
  </div>
  <div>
    <div class="col-head">Nyhedsbrev</div>
    <input type="email" placeholder="din@email.dk">
    <button class="btn">Tilmeld →</button>
  </div>
</div>
<div class="bottom">
  <div>© 2026 HINCHELYS</div>
  <div>Built in Sønderjylland</div>
</div>
</body>
</html>
