<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--alabaster); padding: 28px 32px; }
  article {
    display: flex;
    flex-direction: column;
    gap: 18px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border-soft);
  }
  .meta {
    display: flex;
    gap: 20px;
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: var(--weight-medium);
    letter-spacing: var(--tracking-cta);
    text-transform: uppercase;
    color: var(--fg-muted);
  }
  .meta .tag { padding-left: 20px; border-left: 1px solid var(--border-soft); }
  h3 {
    font-family: var(--font-serif);
    font-weight: var(--weight-light);
    font-size: 30px;
    line-height: 1.1;
    margin: 0;
    color: var(--jet-black);
  }
  p {
    font-family: var(--font-sans);
    font-size: 16px;
    font-weight: var(--weight-light);
    line-height: 1.5;
    margin: 0;
    color: var(--fg-muted);
  }
  .cta {
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: var(--weight-medium);
    letter-spacing: var(--tracking-cta);
    text-transform: uppercase;
    color: var(--jet-black);
  }
</style>
</head>
<body>
<article>
  <div class="meta">
    <span>12. Marts 2026</span>
    <span class="tag">Iværksætteri</span>
  </div>
  <h3>Den knude i maven der aldrig forsvinder.</h3>
  <p>Staten var ingen steder, da jeg lå søvnløs og ikke vidste om jeg kunne betale løn. Nu hvor det lykkedes, banker de på døren med en regning. Det her billede er mig fra 2015 …</p>
  <div class="cta">Læs hele indlægget →</div>
</article>
</body>
</html>
