<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--alabaster); padding: 32px; }
  .display {
    font-family: var(--font-serif);
    font-weight: var(--weight-light);
    font-size: 78px;
    line-height: 0.95;
    letter-spacing: 0;
    color: var(--jet-black);
    margin: 0;
  }
  .display em { font-style: italic; }
  .caption {
    margin-top: 18px;
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: var(--weight-medium);
    letter-spacing: var(--tracking-cta);
    text-transform: uppercase;
    color: var(--fg-muted);
  }
</style>
</head>
<body>
  <h1 class="display">Vi er iværksættere fra Sønderjylland. <em>Ikke et konsulenthus.</em></h1>
  <div class="caption">EB Garamond · Light · 78px · Italic on emphasis</div>
</body>
</html>
