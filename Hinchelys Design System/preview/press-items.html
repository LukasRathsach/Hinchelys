<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--alabaster); padding: 32px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
  a {
    display: flex;
    flex-direction: column;
    gap: 8px;
    text-decoration: none;
    color: var(--jet-black);
    padding: 12px 0;
    border-bottom: none;
  }
  .name { font-family: var(--font-serif); font-style: italic; font-weight: var(--weight-light); font-size: 22px; line-height: 1.1; }
  .date {
    font-family: var(--font-sans);
    font-size: 10px;
    font-weight: var(--weight-medium);
    letter-spacing: var(--tracking-cta);
    text-transform: uppercase;
    color: var(--fg-muted);
  }
</style>
</head>
<body>
<div class="grid">
  <a><div class="name">Berlingske</div><div class="date">12. Marts 2026</div></a>
  <a><div class="name">Børsen</div><div class="date">04. Februar 2026</div></a>
  <a><div class="name">JydskeVestkysten</div><div class="date">18. Januar 2026</div></a>
  <a><div class="name">DR P1 Business</div><div class="date">02. December 2025</div></a>
</div>
</body>
</html>
