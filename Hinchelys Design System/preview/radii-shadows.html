<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--alabaster); padding: 32px; }
  .row { display: flex; gap: 32px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; gap: 10px; align-items: flex-start; }
  .box {
    width: 90px;
    height: 60px;
    background: var(--pure-white);
    border: 1px solid var(--jet-black);
  }
  .r-xs   { border-radius: 2px; }
  .r-sm   { border-radius: 4px; }
  .r-pill { border-radius: 999px; height: 32px; width: 110px; }
  .shadow-menu  { border: none; box-shadow: 0 12px 32px -8px rgba(17,17,17,0.18); }
  .shadow-lift  { border: none; box-shadow: 0 24px 60px -20px rgba(17,17,17,0.25); }
  .label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--fg-muted);
  }
  .title {
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: var(--weight-medium);
    letter-spacing: var(--tracking-cta);
    text-transform: uppercase;
    color: var(--fg-muted);
    margin-bottom: 18px;
  }
</style>
</head>
<body>
  <div class="title">Radii</div>
  <div class="row" style="margin-bottom: 36px;">
    <div class="item"><div class="box"></div><div class="label">--r-none · 0</div></div>
    <div class="item"><div class="box r-xs"></div><div class="label">--r-xs · 2px</div></div>
    <div class="item"><div class="box r-sm"></div><div class="label">--r-sm · 4px</div></div>
    <div class="item"><div class="box r-pill"></div><div class="label">--r-pill · 999px</div></div>
  </div>

  <div class="title">Shadows (reserved for floating UI only)</div>
  <div class="row">
    <div class="item"><div class="box shadow-menu"></div><div class="label">--shadow-menu</div></div>
    <div class="item"><div class="box shadow-lift"></div><div class="label">--shadow-lift</div></div>
  </div>
</body>
</html>
