<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--jet-black); padding: 64px 40px; margin: 0; text-align: center; }
  .star { font-size: 22px; color: var(--aureolin); margin-bottom: 24px; line-height: 1; }
  blockquote {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: var(--weight-light);
    font-size: 36px;
    line-height: 1.15;
    margin: 0;
    color: var(--alabaster);
    max-width: 800px;
    margin-inline: auto;
  }
  blockquote em { font-style: italic; }
  .attr {
    margin-top: 28px;
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: var(--weight-medium);
    letter-spacing: var(--tracking-cta);
    text-transform: uppercase;
    color: var(--concrete);
  }
</style>
</head>
<body>
  <div class="star">★</div>
  <blockquote>Dygtige hænder er ikke plan B. De er fundamentet.</blockquote>
  <div class="attr">Tobias Hinchely · LinkedIn, Marts 2026</div>
</body>
</html>
