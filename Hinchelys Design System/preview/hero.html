<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--alabaster); margin: 0; padding: 40px 32px; }
  .grid {
    display: grid;
    grid-template-columns: minmax(0, 7fr) minmax(0, 5fr);
    gap: 40px;
    align-items: center;
  }
  .eyebrow {
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: var(--weight-medium);
    letter-spacing: var(--tracking-cta);
    text-transform: uppercase;
    color: var(--jet-black);
    margin-bottom: 24px;
  }
  h1 {
    font-family: var(--font-serif);
    font-weight: var(--weight-light);
    font-size: 60px;
    line-height: 0.95;
    letter-spacing: 0;
    margin: 0 0 24px;
    color: var(--jet-black);
  }
  h1 em { font-style: italic; }
  p {
    font-family: var(--font-sans);
    font-size: 16px;
    font-weight: var(--weight-light);
    line-height: 1.5;
    color: var(--fg-muted);
    max-width: 380px;
    margin: 0 0 28px;
  }
  .ctas { display: flex; gap: 12px; }
  .btn {
    height: 44px;
    padding: 0 22px;
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: var(--weight-medium);
    letter-spacing: var(--tracking-cta);
    text-transform: uppercase;
    border: 1px solid var(--jet-black);
    border-radius: 2px;
    background: var(--jet-black);
    color: var(--alabaster);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn.ghost { background: transparent; color: var(--jet-black); }
  .image {
    aspect-ratio: 4/5;
    background: var(--concrete);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--fg-muted);
    font-family: var(--font-sans);
    font-size: 10px;
    font-weight: var(--weight-medium);
    letter-spacing: var(--tracking-cta);
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="grid">
  <div>
    <div class="eyebrow">Iværksætteri · Forfatter · Foredrag</div>
    <h1>Vi er iværksættere fra Sønderjylland. <em>Ikke et konsulenthus.</em></h1>
    <p>Tobias og Julie Silverstein Hinchely. Tre virksomheder, en håndfuld bestyrelser, og et brev nogle gange om måneden.</p>
    <div class="ctas">
      <button class="btn">Book foredrag <span>→</span></button>
      <button class="btn ghost">Se vores virksomheder</button>
    </div>
  </div>
  <div class="image">Flash portrait — Tobias &amp; Julie</div>
</div>
</body>
</html>
