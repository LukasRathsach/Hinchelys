<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--alabaster); padding: 28px 32px; }
  table { width: 100%; border-collapse: collapse; }
  td { padding: 6px 12px; vertical-align: middle; }
  .token {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-muted);
    width: 70px;
  }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); width: 60px; text-align: right; }
  .bar { background: var(--jet-black); height: 14px; }
</style>
</head>
<body>
<table>
  <tr><td class="token">--s-1</td><td><div class="bar" style="width: 4px;"></div></td><td class="px">4 px</td></tr>
  <tr><td class="token">--s-2</td><td><div class="bar" style="width: 8px;"></div></td><td class="px">8 px</td></tr>
  <tr><td class="token">--s-3</td><td><div class="bar" style="width: 12px;"></div></td><td class="px">12 px</td></tr>
  <tr><td class="token">--s-4</td><td><div class="bar" style="width: 16px;"></div></td><td class="px">16 px</td></tr>
  <tr><td class="token">--s-5</td><td><div class="bar" style="width: 24px;"></div></td><td class="px">24 px</td></tr>
  <tr><td class="token">--s-6</td><td><div class="bar" style="width: 32px;"></div></td><td class="px">32 px</td></tr>
  <tr><td class="token">--s-7</td><td><div class="bar" style="width: 48px;"></div></td><td class="px">48 px</td></tr>
  <tr><td class="token">--s-8</td><td><div class="bar" style="width: 64px;"></div></td><td class="px">64 px</td></tr>
  <tr><td class="token">--s-9</td><td><div class="bar" style="width: 96px;"></div></td><td class="px">96 px</td></tr>
  <tr><td class="token">--s-10</td><td><div class="bar" style="width: 128px;"></div></td><td class="px">128 px</td></tr>
  <tr><td class="token">--s-11</td><td><div class="bar" style="width: 192px;"></div></td><td class="px">192 px</td></tr>
</table>
</body>
</html>
