<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--alabaster); padding: 0; margin: 0; }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    height: 360px;
  }
  .cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 32px;
    position: relative;
  }
  .light { background: var(--alabaster); }
  .dark  { background: var(--jet-black); }
  .label {
    position: absolute;
    top: 16px;
    left: 20px;
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: var(--weight-medium);
    letter-spacing: var(--tracking-cta);
    text-transform: uppercase;
  }
  .light .label { color: var(--fg-muted); }
  .dark  .label { color: var(--concrete); }
  .pair { display: flex; align-items: center; gap: 36px; }
</style>
</head>
<body>
<div class="grid">
  <div class="cell light">
    <div class="label">Black variants</div>
    <div class="pair">
      <img src="../assets/logomark_black.svg" alt="" style="height: 88px;">
      <img src="../assets/logotype_black.svg" alt="" style="height: 32px;">
    </div>
  </div>
  <div class="cell dark">
    <div class="label">White variants</div>
    <div class="pair">
      <img src="../assets/logomark_white.svg" alt="" style="height: 88px;">
      <img src="../assets/logotype_white.svg" alt="" style="height: 32px;">
    </div>
  </div>
</div>
</body>
</html>
