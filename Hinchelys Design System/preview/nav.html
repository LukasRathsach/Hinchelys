<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--alabaster); padding: 0; margin: 0; }
  .navbar {
    height: 72px;
    background: rgba(243, 243, 243, 0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-soft);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
  }
  .links { display: flex; gap: 32px; list-style: none; margin: 0; padding: 0; }
  .links a {
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: var(--weight-medium);
    letter-spacing: var(--tracking-cta);
    text-transform: uppercase;
    color: var(--jet-black);
    text-decoration: none;
    padding-bottom: 4px;
  }
  .links a.active { border-bottom: 1px solid currentColor; }
  .body-preview {
    padding: 24px 32px;
    color: var(--fg-muted);
    font-family: var(--font-sans);
    font-size: 13px;
  }
</style>
</head>
<body>
<nav class="navbar">
  <img src="../assets/logotype_black.svg" alt="HINCHELYS" style="height: 22px;">
  <ul class="links">
    <li><a href="#" class="active">Om os</a></li>
    <li><a href="#">Virksomheder</a></li>
    <li><a href="#">Foredrag</a></li>
    <li><a href="#">Medie</a></li>
    <li><a href="#">Kontakt</a></li>
  </ul>
</nav>
<div class="body-preview">72px · sticky after 80px scroll · alabaster/92 + blur(12)</div>
</body>
</html>
