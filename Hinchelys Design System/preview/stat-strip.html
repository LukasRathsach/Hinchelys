<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--alabaster); padding: 0; margin: 0; }
  .strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-top: 1px solid var(--jet-black);
    border-bottom: 1px solid var(--jet-black);
    background: var(--aureolin);
  }
  .cell {
    padding: 36px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .cell + .cell { border-left: 1px solid var(--jet-black); }
  .value {
    font-family: var(--font-serif);
    font-weight: var(--weight-light);
    font-size: 56px;
    line-height: 1;
    color: var(--jet-black);
  }
  .label {
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: var(--weight-medium);
    letter-spacing: var(--tracking-cta);
    text-transform: uppercase;
    color: var(--jet-black);
  }
</style>
</head>
<body>
<div class="strip">
  <div class="cell"><div class="value">250.000+</div><div class="label">Kunder</div></div>
  <div class="cell"><div class="value">3</div><div class="label">Lande</div></div>
  <div class="cell"><div class="value">~50</div><div class="label">Ansatte</div></div>
  <div class="cell"><div class="value">12</div><div class="label">År i drift</div></div>
</div>
</body>
</html>
