<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--alabaster); padding: 32px; }
  .form {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    align-items: center;
  }
  h3 {
    font-family: var(--font-serif);
    font-weight: var(--weight-light);
    font-size: 28px;
    line-height: 1.1;
    margin: 0;
    color: var(--jet-black);
    max-width: 320px;
  }
  .field { display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  input {
    flex: 1;
    height: 56px;
    border: none;
    border-bottom: 1px solid var(--jet-black);
    background: transparent;
    font-family: var(--font-sans);
    font-size: 17px;
    font-weight: var(--weight-light);
    color: var(--jet-black);
    outline: none;
    padding: 0 4px;
  }
  input::placeholder { color: var(--fg-subtle); }
  button {
    height: 56px;
    padding: 0 28px;
    background: var(--jet-black);
    color: var(--alabaster);
    border: 1px solid var(--jet-black);
    border-radius: 2px;
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: var(--weight-medium);
    letter-spacing: var(--tracking-cta);
    text-transform: uppercase;
    cursor: pointer;
  }
  .fine {
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: var(--weight-light);
    letter-spacing: var(--tracking-cta);
    text-transform: uppercase;
    color: var(--fg-muted);
  }
</style>
</head>
<body>
<div class="form">
  <h3>Få et brev. Når der er noget at sige.</h3>
  <div class="field">
    <div class="row">
      <input type="email" placeholder="din@email.dk">
      <button>Tilmeld →</button>
    </div>
    <div class="fine">Ingen spam. Afmelding med ét klik.</div>
  </div>
</div>
</body>
</html>
