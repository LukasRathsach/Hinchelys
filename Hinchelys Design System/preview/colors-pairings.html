<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 32px; background: var(--alabaster); }
  .row { display: flex; align-items: center; gap: 24px; padding: 14px 0; border-bottom: 1px solid var(--border-soft); }
  .row:last-child { border-bottom: none; }
  .label {
    width: 110px;
    font-family: var(--font-sans);
    font-size: 11px;
    letter-spacing: var(--tracking-cta);
    text-transform: uppercase;
    color: var(--fg-muted);
  }
  .body-on { flex: 1; padding: 8px 14px; border-radius: 2px; }
  .body-jet { background: var(--jet-black); color: var(--alabaster); }
  .body-yellow { background: var(--aureolin); color: var(--jet-black); }
  .body-white { background: var(--pure-white); color: var(--jet-black); border: 1px solid var(--border-soft); }
  .body-concrete { background: var(--concrete); color: var(--jet-black); }
  .ratio { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
</style>
</head>
<body>
<div class="row">
  <div class="label">Jet / Alabaster</div>
  <div class="body-on body-jet">Confident, contemporary, composed.</div>
  <div class="ratio">19.6 : 1 — AAA</div>
</div>
<div class="row">
  <div class="label">Yellow / Jet</div>
  <div class="body-on body-yellow">Boring marketing? It never works.</div>
  <div class="ratio">15.4 : 1 — AAA</div>
</div>
<div class="row">
  <div class="label">White / Jet</div>
  <div class="body-on body-white">Tre virksomheder. En adresse.</div>
  <div class="ratio">19.6 : 1 — AAA</div>
</div>
<div class="row">
  <div class="label">Concrete / Jet</div>
  <div class="body-on body-concrete">For captions, meta, deemphasis.</div>
  <div class="ratio">8.1 : 1 — AAA</div>
</div>
</body>
</html>
